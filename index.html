<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>박무현의 낮잠</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="game_wrapper" id="gameWrapper">

    <!-- 배경: 방 씬 -->
    <div class="room_bg" id="roomBg">

      <!-- 어두워지는 오버레이 -->
      <div class="darkness_overlay" id="darknessOverlay"></div>

      <!-- 씬 이미지 영역: 자는 사람 + 물 차오르는 단계 (stage 0~5) -->
      <div class="scene_area" id="sceneArea">
        <img class="scene_img active" id="sceneImg0" src="stages/stage0.svg" alt="평화롭게 자는 상태" />
        <img class="scene_img" id="sceneImg1" src="stages/stage3.svg" alt="물이 매트리스 높이까지" />
        <img class="scene_img" id="sceneImg2" src="stages/stage5.svg" alt="얼굴만 수면 위" />

        <!-- 이미지 없을 때 폴백 -->
        <div class="scene_fallback" id="sceneFallback">
          <span class="cat_emoji" id="catEmoji">💤</span>
        </div>
      </div>

      <!-- 책상 / 사이드 가구 -->
      <div class="desk">
        <div class="desk_lamp">
          <div class="lamp_head"></div>
          <div class="lamp_pole"></div>
          <div class="lamp_base"></div>
          <div class="lamp_glow"></div>
        </div>
        <div class="desk_surface"></div>
      </div>

      <!-- 바닥 -->
      <div class="floor"></div>

    </div>

    <!-- 게임 필드 -->
    <div class="game_field" id="gameField"></div>

    <!-- HUD -->
    <div class="hud">
      <div class="hud_item">
        <span class="hud_label">점수</span>
        <span class="hud_value" id="scoreDisplay">0</span>
      </div>
      <div class="hud_item">
        <span class="hud_label">레벨</span>
        <span class="hud_value" id="levelDisplay">1</span>
      </div>
      <div class="hud_item">
        <span class="hud_label">남은 기회</span>
        <span class="hud_value lives_display" id="livesDisplay">❤️❤️❤️❤️❤️</span>
      </div>
    </div>

    <!-- 카테고리 배지 바 -->
    <div class="category_bar hidden" id="categoryBar"></div>

    <!-- 입력 영역 -->
    <div class="input_area">
      <div class="input_wrapper">
        <input
          type="text"
          id="typingInput"
          class="typing_input"
          placeholder="단어를 입력하세요..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
      </div>
    </div>

    <!-- 시작 화면 -->
    <div class="start_screen" id="startScreen">
      <div class="start_card">
        <div class="start_cat_icon">💤</div>
        <h1 class="start_title">박무현의 낮잠</h1>
        <p class="start_desc">
          단어를 빠르게 입력해서<br/>
          박무현 선생님의 악몽을 없애주세요!
        </p>
        <div class="start_instructions">
          <div class="instruction_item">⬇️ 단어가 아래로 떨어집니다</div>
          <div class="instruction_item">⌨️ 화면 하단 입력창에 타이핑하세요</div>
          <div class="instruction_item">🌊 꿈이 깊어질수록 바다가 차오릅니다</div>
        </div>
		<p class="start_tip">💻 PC 환경에서 플레이하는 것을 권장합니다</p>
        <button class="start_btn" id="startBtn">게임 시작</button>
      </div>
    </div>

    <!-- 게임 오버 화면 -->
    <div class="gameover_screen hidden" id="gameoverScreen">
      <div class="gameover_card">
        <div class="gameover_scene">
          <img src="stages/gameover_scene.svg" alt="잠에서 깬 박무현" class="gameover_img"/>
        </div>
        <h2 class="gameover_title">꿈이었구나.</h2>
        <p class="gameover_sub">말로 표현할 수 없을 정도의 어마어마한<br>안도감이 온몸에 퍼졌다.</p>
        <p class="gameover_score">최종 점수: <span id="finalScore">0</span></p>
        <p class="gameover_level">도달 레벨: <span id="finalLevel">1</span></p>
        <button class="restart_btn" id="restartBtn">다시 자기</button>
        <button class="title_btn" id="titleBtn">타이틀로</button>
      </div>
    </div>

  </div>

  <script src="gameLogic.js"></script>
</body>
</html>
