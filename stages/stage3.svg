<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="s3_blanket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a5070"/>
      <stop offset="100%" stop-color="#1e2e45"/>
    </linearGradient>
    <linearGradient id="s3_water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#153a55" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#060e18" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="s3_wet_blanket" x1="0%" y1="70%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e3e55"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
  </defs>

  <!-- 침대 헤드보드 -->
  <rect x="30" y="60" width="260" height="18" rx="4" fill="#2a1f14"/>
  <rect x="35" y="55" width="250" height="12" rx="3" fill="#3a2a18"/>

  <!-- 매트리스 (물에 잠길 부분은 표시 안함) -->
  <rect x="30" y="78" width="260" height="90" rx="4" fill="#e8dcc8"/>
  <rect x="30" y="78" width="260" height="8" rx="4" fill="#f0e4d0"/>

  <!-- 베개 -->
  <rect x="45" y="82" width="75" height="45" rx="8" fill="#f5ede0"/>
  <rect x="48" y="85" width="69" height="39" rx="6" fill="#faf4ec"/>

  <!-- 이불 (아래쪽이 물에 잠겨 색 변함) -->
  <path d="M120 88 Q160 85 290 90 L290 168 Q160 165 120 168 Z" fill="url(#s3_blanket)"/>
  <path d="M120 88 Q160 84 290 89" fill="none" stroke="#4a6080" stroke-width="1.5"/>
  <!-- 이불 물에 젖은 부분 -->
  <path d="M120 150 Q160 148 290 152 L290 168 Q160 165 120 168 Z" fill="url(#s3_wet_blanket)" opacity="0.8"/>

  <!-- 자는 사람 (살짝 불안한 표정으로 변화) -->
  <ellipse cx="82" cy="96" rx="22" ry="18" fill="#d4a574"/>
  <ellipse cx="82" cy="83" rx="22" ry="12" fill="#2a1a0a"/>
  <path d="M60 90 Q62 80 82 78 Q95 77 100 85" fill="#2a1a0a"/>
  <!-- 눈썹 살짝 찌푸림 -->
  <path d="M70 93 Q74 91 78 93" fill="none" stroke="#5a3a1a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M72 97 Q76 95 80 97" fill="none" stroke="#5a3a1a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M78 102 Q80 104 82 102" fill="none" stroke="#b08050" stroke-width="1" stroke-linecap="round"/>
  <!-- 입 살짝 다문 -->
  <path d="M74 108 Q78 107 82 108" fill="none" stroke="#9a6040" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 침대 프레임 하단 (물 속에 잠김) -->
  <rect x="30" y="165" width="260" height="10" rx="3" fill="#1e1510" opacity="0.5"/>

  <!-- 고양이 (발을 들어올림 - 물 피하려고) -->
  <ellipse cx="255" cy="145" rx="18" ry="12" fill="#8a7a6a"/>
  <ellipse cx="255" cy="130" rx="13" ry="12" fill="#8a7a6a"/>
  <polygon points="245,121 241,112 250,118" fill="#8a7a6a"/>
  <polygon points="265,121 269,112 260,118" fill="#8a7a6a"/>
  <polygon points="246,120 243,114 250,118" fill="#c9a0a0"/>
  <polygon points="264,120 267,114 260,118" fill="#c9a0a0"/>
  <!-- 큰 눈 (겁먹음) -->
  <ellipse cx="250" cy="131" rx="4" ry="4" fill="#3a3020"/>
  <ellipse cx="260" cy="131" rx="4" ry="4" fill="#3a3020"/>
  <circle cx="251" cy="130" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="261" cy="130" r="1.5" fill="#ffffff" opacity="0.8"/>
  <line x1="242" y1="136" x2="250" y2="135" stroke="#c8c0b0" stroke-width="0.8"/>
  <line x1="242" y1="138" x2="250" y2="138" stroke="#c8c0b0" stroke-width="0.8"/>
  <line x1="260" y1="135" x2="268" y2="136" stroke="#c8c0b0" stroke-width="0.8"/>
  <line x1="260" y1="138" x2="268" y2="138" stroke="#c8c0b0" stroke-width="0.8"/>
  <ellipse cx="255" cy="137" rx="2.5" ry="1.5" fill="#d08888"/>

  <!-- 물 (매트리스 높이까지) -->
  <path d="M0 152 Q25 147 55 152 Q85 157 120 150 Q155 143 190 149 Q225 155 260 148 Q285 143 320 148 L320 200 L0 200 Z" fill="url(#s3_water)"/>
  <!-- 물 물결 -->
  <path d="M0 152 Q40 147 80 152 Q120 157 160 150" fill="none" stroke="#2a7a8a" stroke-width="1.2" opacity="0.7"/>
  <path d="M160 150 Q200 143 240 149 Q280 155 320 148" fill="none" stroke="#2a7a8a" stroke-width="1.2" opacity="0.7"/>
  <!-- 거품 -->
  <circle cx="40" cy="151" r="2" fill="#4a9aaa" opacity="0.4"/>
  <circle cx="130" cy="149" r="1.5" fill="#4a9aaa" opacity="0.3"/>
  <circle cx="220" cy="148" r="2.5" fill="#4a9aaa" opacity="0.35"/>

  <!-- z (거의 사라지는 수면) -->
  <text x="108" y="85" font-family="serif" font-size="11" fill="#6677aa" opacity="0.4">z</text>
</svg>
