  <ellipse cx="225" cy="45" rx="5" ry="5" fill="#0a0a08"/>
  <ellipse cx="235" cy="45" rx="5" ry="5" fill="#0a0a08"/>
  <circle cx="226" cy="44" r="2.5" fill="#ffffff" opacity="0.95"/>
  <circle cx="236" cy="44" r="2.5" fill="#ffffff" opacity="0.95"/>
