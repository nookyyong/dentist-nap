  <path d="M71 101 Q77 105 84 101" fill="none" stroke="#8a5030" stroke-width="1.8" stroke-linecap="round"/>

  <!-- 침대 프레임 하단 -->
  <rect x="30" y="165" width="260" height="10" rx="3" fill="#2a1f14"/>
  <!-- 침대 다리 -->
  <rect x="35" y="172" width="10" height="20" rx="2" fill="#1e1510"/>
  <rect x="275" y="172" width="10" height="20" rx="2" fill="#1e1510"/>

  <!-- 고양이 (헤드보드 위에 올라가 있음, 물 피함) -->
  <ellipse cx="230" cy="58" rx="20" ry="10" fill="#7a6a5a"/>
  <ellipse cx="230" cy="44" rx="13" ry="12" fill="#7a6a5a"/>
  <polygon points="221,35 217,26 226,32" fill="#7a6a5a"/>
  <polygon points="239,35 243,26 234,32" fill="#7a6a5a"/>
  <polygon points="222,34 219,28 226,32" fill="#c09898"/>
  <polygon points="238,34 241,28 234,32" fill="#c09898"/>
