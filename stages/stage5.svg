  <path d="M70 90 Q75 87 81 90" fill="none" stroke="#4a2a0a" stroke-width="2" stroke-linecap="round"/>
  <!-- 땀 -->
  <circle cx="90" cy="80" r="2" fill="#b0d0e0" opacity="0.6"/>
  <circle cx="95" cy="88" r="1.5" fill="#b0d0e0" opacity="0.5"/>
  <path d="M77 95 Q79 97 82 95" fill="none" stroke="#a07040" stroke-width="1" stroke-linecap="round"/>
