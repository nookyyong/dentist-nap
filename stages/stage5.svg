  <path d="M218 60 Q220 58 225 60" fill="none" stroke="#7a6a5a" stroke-width="3" stroke-linecap="round"/>
  <path d="M235 60 Q238 58 242 60" fill="none" stroke="#7a6a5a" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="51" x2="225" y2="50" stroke="#b0a898" stroke-width="0.8"/>
  <line x1="221" y1="53" x2="225" y2="53" stroke="#b0a898" stroke-width="0.8"/>
  <line x1="235" y1="50" x2="240" y2="51" stroke="#b0a898" stroke-width="0.8"/>
  <line x1="235" y1="53" x2="240" y2="53" stroke="#b0a898" stroke-width="0.8"/>
  <ellipse cx="230" cy="51" rx="2" ry="1.5" fill="#d08888"/>

  <!-- z (거의 사라지는 수면) -->
  <text x="108" y="85" font-family="serif" font-size="11" fill="#6677aa" opacity="0.4">z</text>
</svg>