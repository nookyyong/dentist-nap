  <circle cx="168" cy="22" r="12" fill="#d4c890"/>
  <circle cx="173" cy="18" r="10" fill="#1a2030"/>
  <!-- 달 표면 크레이터 -->
  <circle cx="163" cy="26" r="2" fill="#c0b878" opacity="0.4"/>
  <circle cx="160" cy="18" r="1.5" fill="#c0b878" opacity="0.3"/>

  <!-- 달빛 반사 (바다) -->
  <path d="M145 92 Q160 88 175 92 Q165 96 150 96 Z" fill="#d4c890" opacity="0.15"/>
  <path d="M148 98 Q160 95 172 98 Q165 101 152 101 Z" fill="#d4c890" opacity="0.1"/>

  <!-- 바다 -->
  <rect x="0" y="88" width="200" height="72" fill="url(#go_sea)"/>
