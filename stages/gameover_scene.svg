  <line x1="160" y1="175" x2="160" y2="240" stroke="#b89060" stroke-width="0.5" opacity="0.3"/>
  <line x1="240" y1="175" x2="240" y2="240" stroke="#b89060" stroke-width="0.5" opacity="0.3"/>

