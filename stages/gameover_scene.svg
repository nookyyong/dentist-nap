  <line x1="70" y1="98" x2="65" y2="115" stroke="#2a1e12" stroke-width="0.8" opacity="0.5"/>
  <line x1="90" y1="96" x2="87" y2="116" stroke="#2a1e12" stroke-width="0.8" opacity="0.5"/>
  <line x1="110" y1="95" x2="109" y2="117" stroke="#2a1e12" stroke-width="0.8" opacity="0.5"/>
  <line x1="130" y1="96" x2="131" y2="116" stroke="#2a1e12" stroke-width="0.8" opacity="0.5"/>
