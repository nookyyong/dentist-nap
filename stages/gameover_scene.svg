  <polygon points="210,108 295,108 310,175 195,175" fill="#ffe87a" opacity="0.12"/>

  <!-- 작은 화분 (왼쪽 구석) -->
  <rect x="24" y="142" width="22" height="28" fill="#8b6040" rx="2"/>
