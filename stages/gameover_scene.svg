  <!-- 몸 -->
  <rect x="72" y="82" width="22" height="18" rx="4" fill="#c89a64"/>
  <!-- 옷 (잠옷) -->
  <rect x="72" y="88" width="22" height="12" rx="3" fill="#4a6080"/>
  <!-- 머리 -->
  <ellipse cx="83" cy="78" rx="13" ry="12" fill="#d4a574"/>
  <!-- 헝클어진 머리카락 -->
  <path d="M70 73 Q72 64 83 62 Q94 61 96 70" fill="#2a1a0a"/>
  <path d="M70 73 Q68 68 72 65" fill="#2a1a0a"/>
  <path d="M96 70 Q98 65 95 62" fill="#2a1a0a"/>
  <!-- 뜬 눈 (놀람) -->
  <ellipse cx="78" cy="78" rx="4" ry="4.5" fill="#ffffff"/>
  <ellipse cx="88" cy="78" rx="4" ry="4.5" fill="#ffffff"/>
  <ellipse cx="78" cy="79" rx="2.5" ry="2.5" fill="#5a3a1a"/>
  <ellipse cx="88" cy="79" rx="2.5" ry="2.5" fill="#5a3a1a"/>
  <circle cx="79" cy="78" r="1" fill="#2a1a0a"/>
  <circle cx="89" cy="78" r="1" fill="#2a1a0a"/>
  <!-- 눈 하이라이트 -->
  <circle cx="80" cy="77" r="0.8" fill="#ffffff"/>
  <circle cx="90" cy="77" r="0.8" fill="#ffffff"/>
  <!-- 땀 흘림 -->
  <path d="M95" y1="72" x2="99" y2="78" fill="none"/>
  <ellipse cx="97" cy="72" rx="2" ry="3" fill="#88c0d8" opacity="0.7" transform="rotate(20, 97, 72)"/>
  <!-- 입 (놀람/헉) -->
