  <circle cx="157" cy="161" r="3.2" fill="#4a3020"/>
  <circle cx="158.5" cy="159.5" r="1.2" fill="white"/>

  <!-- 눈썹 (놀란 표정) -->
  <path d="M136,153 Q141,149 146,152" fill="none" stroke="#3a2510" stroke-width="2" stroke-linecap="round"/>
  <path d="M152,152 Q157,149 162,153" fill="none" stroke="#3a2510" stroke-width="2" stroke-linecap="round"/>

  <!-- 코 -->
  <ellipse cx="149" cy="166" rx="2.5" ry="1.8" fill="#e0a878"/>

  <!-- 입 (벌어진 입, 놀람) -->
  <path d="M143,171 Q149,176 155,171" fill="#c06050" stroke="none"/>
  <ellipse cx="149" cy="172" rx="6" ry="4" fill="#c06050"/>
  <ellipse cx="149" cy="173" rx="4.5" ry="3" fill="#8a2020"/>

  <!-- 당황 표시 (땀방울) -->
  <ellipse cx="170" cy="148" rx="4" ry="6" fill="#90c8f0" opacity="0.8"/>
  <ellipse cx="170" cy="146" rx="2.5" ry="3" fill="#b0d8ff" opacity="0.5"/>

  <!-- 놀람 별표/선 -->
  <line x1="178" y1="140" x2="186" y2="132" stroke="#f0b030" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="182" y1="142" x2="192" y2="138" stroke="#f0b030" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="180" y1="136" x2="184" y2="126" stroke="#f0b030" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- 물웅덩이 흔적 (악몽의 잔재) - 희미하게 -->
  <ellipse cx="90" cy="232" rx="35" ry="7" fill="#90b8e0" opacity="0.2"/>
  <ellipse cx="200" cy="238" rx="25" ry="5" fill="#90b8e0" opacity="0.15"/>

  <!-- 고양이 (stage3.svg에서 그대로 가져옴, translate로 위치 이동) -->
  <ellipse cx="68" cy="228" rx="18" ry="5" fill="#6a5a4a" opacity="0.25"/>
  <g transform="translate(-187, 75)">
    <ellipse cx="255" cy="145" rx="18" ry="12" fill="#8a7a6a"/>
    <ellipse cx="255" cy="130" rx="13" ry="12" fill="#8a7a6a"/>
    <polygon points="245,121 241,112 250,118" fill="#8a7a6a"/>
    <polygon points="265,121 269,112 260,118" fill="#8a7a6a"/>
    <polygon points="246,120 243,114 250,118" fill="#c9a0a0"/>
    <polygon points="264,120 267,114 260,118" fill="#c9a0a0"/>
    <ellipse cx="250" cy="131" rx="4" ry="4" fill="#3a3020"/>
    <ellipse cx="260" cy="131" rx="4" ry="4" fill="#3a3020"/>
    <circle cx="251" cy="130" r="1.5" fill="#ffffff" opacity="0.8"/>
    <circle cx="261" cy="130" r="1.5" fill="#ffffff" opacity="0.8"/>
    <line x1="242" y1="136" x2="250" y2="135" stroke="#c8c0b0" stroke-width="0.8"/>
    <line x1="242" y1="138" x2="250" y2="138" stroke="#c8c0b0" stroke-width="0.8"/>
    <line x1="260" y1="135" x2="268" y2="136" stroke="#c8c0b0" stroke-width="0.8"/>
    <line x1="260" y1="138" x2="268" y2="138" stroke="#c8c0b0" stroke-width="0.8"/>
    <ellipse cx="255" cy="137" rx="2.5" ry="1.5" fill="#d08888"/>
  </g>
</svg>
