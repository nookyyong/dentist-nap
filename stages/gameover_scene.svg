  <!-- 손으로 가슴 짚음 -->
  <path d="M72 90 Q65 87 62 92" fill="none" stroke="#c89a64" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="60" cy="93" rx="5" ry="4" fill="#c89a64"/>

  <!-- 고양이 (배 앞부분에 앉아서 주인공 바라봄) -->
  <ellipse cx="128" cy="97" rx="12" ry="9" fill="#8a7a6a"/>
  <ellipse cx="128" cy="86" rx="10" ry="9" fill="#8a7a6a"/>
  <polygon points="121,79 118,71 125,77" fill="#8a7a6a"/>
  <polygon points="135,79 138,71 131,77" fill="#8a7a6a"/>
  <polygon points="122,78 120,73 125,77" fill="#c9a0a0"/>
  <polygon points="134,78 136,73 131,77" fill="#c9a0a0"/>
  <!-- 고양이 눈 (주인공 쳐다봄) -->
  <ellipse cx="124" cy="87" rx="3.5" ry="3.5" fill="#2a2010"/>
  <ellipse cx="132" cy="87" rx="3.5" ry="3.5" fill="#2a2010"/>
  <circle cx="125" cy="86" r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="133" cy="86" r="1.5" fill="#ffffff" opacity="0.9"/>
  <!-- 고양이 수염 -->
  <line x1="116" y1="91" x2="123" y2="90" stroke="#c0b8a8" stroke-width="0.8"/>
  <line x1="116" y1="93" x2="123" y2="93" stroke="#c0b8a8" stroke-width="0.8"/>
  <line x1="133" y1="90" x2="140" y2="91" stroke="#c0b8a8" stroke-width="0.8"/>
  <line x1="133" y1="93" x2="140" y2="93" stroke="#c0b8a8" stroke-width="0.8"/>
  <ellipse cx="128" cy="93" rx="2" ry="1.5" fill="#d08888"/>
  <!-- 고양이 꼬리 -->
  <path d="M138 102 Q148 100 150 108 Q148 114 140 112" fill="none" stroke="#8a7a6a" stroke-width="3.5" stroke-linecap="round"/>
</svg>
