<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" width="200" height="160">
  <defs>
    <linearGradient id="go_sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a55"/>
      <stop offset="100%" stop-color="#060e1a"/>
    </linearGradient>
    <linearGradient id="go_sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <linearGradient id="go_boat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2a18"/>
      <stop offset="100%" stop-color="#1e1510"/>
    </linearGradient>
  </defs>

  <!-- 하늘 -->
  <rect x="0" y="0" width="200" height="95" fill="url(#go_sky)"/>

  <!-- 별들 -->
  <circle cx="15" cy="12" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="35" cy="8" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="55" cy="18" r="0.7" fill="#ffffff" opacity="0.6"/>
  <circle cx="80" cy="6" r="0.9" fill="#ffffff" opacity="0.75"/>
  <circle cx="105" cy="14" r="0.8" fill="#ffffff" opacity="0.65"/>
  <circle cx="130" cy="5" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="155" cy="20" r="0.7" fill="#ffffff" opacity="0.7"/>
  <circle cx="178" cy="10" r="0.9" fill="#ffffff" opacity="0.6"/>
  <circle cx="190" cy="22" r="0.6" fill="#ffffff" opacity="0.5"/>
  <circle cx="25" cy="30" r="0.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="70" cy="28" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="145" cy="32" r="0.7" fill="#ffffff" opacity="0.55"/>
  <circle cx="175" cy="38" r="0.6" fill="#ffffff" opacity="0.5"/>

