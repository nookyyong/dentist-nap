  <ellipse cx="141" cy="160" rx="5" ry="5.5" fill="white"/>
  <circle cx="141" cy="161" r="3.2" fill="#4a3020"/>
  <circle cx="142.5" cy="159.5" r="1.2" fill="white"/>
  <!-- 오른쪽 눈 -->
