  <path d="M0 88 Q25 84 50 88 Q75 92 100 87 Q125 82 150 87 Q175 92 200 86" fill="none" stroke="#2a5a7a" stroke-width="1.5" opacity="0.7"/>
  <path d="M0 96 Q30 92 60 97 Q90 102 120 95 Q150 88 180 94 Q190 97 200 93" fill="none" stroke="#1a4a6a" stroke-width="1" opacity="0.5"/>
  <path d="M0 104 Q35 100 70 105 Q105 110 140 102 Q165 96 200 101" fill="none" stroke="#1a3a5a" stroke-width="0.8" opacity="0.4"/>

