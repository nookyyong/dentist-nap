  <ellipse cx="24" cy="124" rx="10" ry="9" fill="#4a7a35"/>
  <ellipse cx="46" cy="126" rx="10" ry="9" fill="#4a7a35"/>
  <ellipse cx="35" cy="118" rx="9" ry="9" fill="#6a9a55"/>

