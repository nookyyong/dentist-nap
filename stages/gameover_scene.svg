  <line x1="100" y1="58" x2="125" y2="68" stroke="#a09070" stroke-width="0.5" opacity="0.5"/>
  <line x1="100" y1="68" x2="128" y2="71" stroke="#a09070" stroke-width="0.5" opacity="0.4"/>

